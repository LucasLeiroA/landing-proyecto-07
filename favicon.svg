<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Key 3D side (bottom depth) -->
  <rect x="2" y="8" width="28" height="22" rx="6" fill="#b0b8b2"/>
  <!-- Key front face (slightly lighter) -->
  <rect x="2" y="6" width="28" height="21" rx="6" fill="#d4d8d4"/>
  <!-- Key top face (white/cream) -->
  <rect x="2" y="2" width="28" height="21" rx="6" fill="#f2f4f2"/>
  <!-- Inner recess (keycap dished surface) -->
  <rect x="5" y="5" width="22" height="15" rx="4" fill="#ebebeb"/>
  <!-- Subtle inner shadow top -->
  <rect x="5" y="5" width="22" height="3" rx="4" fill="rgba(0,0,0,0.04)"/>
  <!-- P.07 text -->
  <text x="7" y="16" font-family="'Arial Black', Arial, sans-serif" font-size="8" font-weight="900" fill="#2c3330" letter-spacing="-0.3">P.07</text>
</svg>
